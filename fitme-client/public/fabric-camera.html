<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitMe AI | Cyber-Tailor Precision</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --accent: #a855f7;
      --panel: rgba(30, 41, 59, 0.7);
      --input-bg: rgba(15, 23, 42, 0.6);
      --border: rgba(255, 255, 255, 0.1);
    }

    body {
      margin: 0; padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: #fff;
      min-height: 100vh;
      display: flex; justify-content: center; align-items: center;
      background-image: radial-gradient(circle at 0% 0%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
    }

    .container { width: 95%; max-width: 800px; padding: 20px; }

    .glass-card {
      background: var(--panel);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 30px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      text-align: center;
    }

    h1 { font-size: 1.8rem; margin: 0; letter-spacing: -1px; font-weight: 800; }
    
    .status-bar { 
      font-size: 0.85rem; color: #94a3b8; 
      margin: 8px 0 20px 0; 
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .status-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; }
    .status-dot.active { background: #10b981; box-shadow: 0 0 10px #10b981; }

    .viewport {
      position: relative; border-radius: 20px; overflow: hidden;
      aspect-ratio: 16/10; background: #000; border: 1px solid #334155;
      margin-bottom: 15px;
    }
    #video, #poseCanvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); position: absolute; top:0; left:0; }

    .scan-line {
      position: absolute; width: 100%; height: 4px;
      background: linear-gradient(to right, transparent, var(--accent), transparent);
      box-shadow: 0 0 20px var(--accent); top: -10px; z-index: 10;
      display: none; animation: scanMove 2.5s ease-in-out infinite;
    }
    @keyframes scanMove { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }

    .panel { display: none; animation: fadeIn 0.5s ease-out; }
    .panel.active { display: block; }

    /* Fixed Input Grid - No Overlapping */
    .input-grid { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 20px; /* Space between boxes */
      margin: 25px 0; 
    }

    .field { text-align: left; }
    label { font-size: 0.75rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px; display: block; }
    
    input, select {
      width: 100%; padding: 14px; background: var(--input-bg);
      border: 1px solid var(--border); border-radius: 12px;
      color: #fff; font-size: 0.95rem; outline: none; box-sizing: border-box;
    }
    input:focus, select:focus { border-color: var(--accent); }

    /* Results */
    .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .res-item { background: rgba(15,23,42,0.4); padding: 15px; border-radius: 16px; border: 1px solid #1e293b; text-align: left; }
    .res-label { font-size: 10px; color: #64748b; text-transform: uppercase; font-weight: 800; }
    .res-val { font-size: 1.4rem; font-weight: 800; margin-top: 5px; }

    .fabric-banner {
      background: linear-gradient(135deg, #7c3aed, #db2777);
      padding: 25px; border-radius: 24px; margin-bottom: 25px;
    }

    .btn {
      width: 100%; padding: 16px; border-radius: 16px; border: none;
      font-size: 1rem; font-weight: 800; cursor: pointer; transition: 0.2s; text-transform: uppercase;
    }
    .btn-primary { background: #fff; color: var(--bg); }
    .btn-primary:hover { background: var(--accent); color: #fff; transform: translateY(-2px); }
    
    #countdown {
      position: absolute; top:50%; left:50%; transform:translate(-50%, -50%);
      font-size: 6rem; font-weight: 900; z-index: 20; color: #fff;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
</head>
<body>

<div class="container">
  <div class="glass-card">
    <h1>FITME <span style="font-weight:400; color:var(--accent)">AI</span></h1>
    <div class="status-bar">
      <div id="dot" class="status-dot"></div>
      <span id="stat-text">Stand 6-8 feet away for scanning</span>
    </div>

    <div id="p1" class="panel active">
      <div class="viewport">
        <div id="laser" class="scan-line"></div>
        <video id="video"></video>
        <canvas id="poseCanvas"></canvas>
        <div id="countdown"></div>
      </div>
    </div>

    <div id="p2" class="panel">
      <div class="input-grid">
        <div class="field">
          <label>Height (cm)</label>
          <input type="number" id="h-in" placeholder="e.g. 176">
        </div>
        <div class="field">
          <label>Gender Profile</label>
          <select id="gender-in">
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
        </div>
        <div class="field">
          <label>Usual Shirt Size</label>
          <select id="size-in">
            <option value="S">Small (S)</option>
            <option value="M" selected>Medium (M)</option>
            <option value="L">Large (L)</option>
            <option value="XL">Extra Large (XL)</option>
          </select>
        </div>
        <div class="field">
          <label>Garment Type</label>
          <select id="gar-in">
            <option value="kurta">Kurta</option>
            <option value="shirt">Formal Shirt</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="calculate()">Finalize Measurements</button>
    </div>

    <div id="p3" class="panel">
      <div class="res-grid" id="report"></div>
      <div class="fabric-banner">
        <label style="font-size: 11px; font-weight: 800; opacity: 0.8;">PRECISE FABRIC ESTIMATE</label>
        <div id="meters" style="font-size: 2.5rem; font-weight: 900;">0.00m</div>
      </div>
      <button class="btn btn-primary" onclick="location.reload()">Start New Session</button>
    </div>
  </div>
</div>

<script>
  let pose, camera, lastData, locked = false;

  function init() {
    pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
    pose.setOptions({modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6});
    
    pose.onResults(res => {
      const cvs = document.getElementById("poseCanvas");
      const ctx = cvs.getContext("2d");
      cvs.width = video.videoWidth; cvs.height = video.videoHeight;
      ctx.clearRect(0,0,cvs.width,cvs.height);
      
      if (res.poseLandmarks) {
        drawConnectors(ctx, res.poseLandmarks, POSE_CONNECTIONS, {color: '#a855f7', lineWidth: 3});
        lastData = res.poseLandmarks;
        
        const pts = [11, 12, 31, 32];
        const visible = pts.every(i => res.poseLandmarks[i].visibility > 0.85);
        
        if (visible && !locked) {
          locked = true;
          document.getElementById("dot").classList.add("active");
          document.getElementById("stat-text").innerText = "Position Secured. Scanning...";
          document.getElementById("laser").style.display = "block";
          startTimer();
        }
      }
    });

    camera = new Camera(document.getElementById("video"), {
      onFrame: async () => { await pose.send({image: document.getElementById("video")}); }
    });
    camera.start();
  }

  function startTimer() {
    let s = 3;
    const el = document.getElementById("countdown");
    const iv = setInterval(() => {
      el.innerText = s; s--;
      if (s < 0) { 
        clearInterval(iv); 
        camera.stop();
        document.getElementById("p1").classList.remove("active");
        document.getElementById("p2").classList.add("active");
        document.getElementById("stat-text").innerText = "Scan Verified";
      }
    }, 1000);
  }

  function calculate() {
    const h = parseFloat(document.getElementById("h-in").value);
    const size = document.getElementById("size-in").value;
    const gender = document.getElementById("gender-in").value;
    if (!h) return alert("Please enter height");

    const lm = lastData;
    const ppcm = (Math.abs((lm[31].y + lm[32].y)/2 - lm[0].y) * video.videoHeight) / (h * 0.88);
    const dist = (p1, p2) => Math.sqrt(Math.pow((p1.x - p2.x)*video.videoWidth,2) + Math.pow((p1.y - p2.y)*video.videoHeight,2));
    
    const rawS = dist(lm[11], lm[12]) / ppcm;
    const rawH = dist(lm[23], lm[24]) / ppcm;

    // --- ACCURACY LOGIC MAPPED TO S, M, L, XL ---
    // Multipliers adjusted for anatomical depth and flesh coverage
    let sM, gM;

    const sizeMap = {
      'S':  { sMult: 1.38, gMult: 2.15 },
      'M':  { sMult: 1.45, gMult: 2.38 },
      'L':  { sMult: 1.55, gMult: 2.52 },
      'XL': { sMult: 1.68, gMult: 2.75 }
    };

    sM = sizeMap[size].sMult;
    gM = sizeMap[size].gMult;

    // Gender Adjustment
    if (gender === "male") gM -= 0.12;

    const shoulder = Math.round(rawS * sM);
    const chest = Math.round(shoulder * gM);
    const waist = Math.round(rawH * 0.82 * gM);
    const hip = Math.round(rawH * (gM + 0.25));

    const baseFabric = document.getElementById("gar-in").value === "kurta" ? 2.5 : 2.1;
    const fabric = (baseFabric * (chest/94) * (h/172) * 1.1).toFixed(2);

    document.getElementById("meters").innerText = fabric + "m";
    document.getElementById("report").innerHTML = `
      <div class="res-item"><span class="res-label">Shoulder</span><div class="res-val">${shoulder}cm</div></div>
      <div class="res-item"><span class="res-label">Chest</span><div class="res-val">${chest}cm</div></div>
      <div class="res-item"><span class="res-label">Waist</span><div class="res-val">${waist}cm</div></div>
      <div class="res-item"><span class="res-label">Hips</span><div class="res-val">${hip}cm</div></div>
    `;
    document.getElementById("p2").classList.remove("active");
    document.getElementById("p3").classList.add("active");
  }

  window.onload = init;
</script>
</body>
</html>
